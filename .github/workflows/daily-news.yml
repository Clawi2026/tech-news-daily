name: Daily News Fetch

on:
  schedule:
    # 每天 UTC 0:00 (北京时间 8:00) 自动运行
    #- cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news
        run: npx ts-node scripts/fetch-news.ts

      - name: Commit and push news data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git add public/data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "📰 更新每日新闻 $(date +%Y-%m-%d)" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
