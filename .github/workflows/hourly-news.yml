name: Hourly News Fetch

on:
  schedule:
    # 每小时整点运行（UTC 时间，对应北京时间 8:00-23:00）
    - cron: '0 0-15 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news from RSS (Stable)
        run: node scripts/fetch-rss-news.js
        env:
          NODE_TIMEOUT: 120000

      - name: Commit and push news data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Tech News Bot"
          git add public/data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "📰 更新新闻 $(date +%Y-%m-%d-%H-%M)" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
