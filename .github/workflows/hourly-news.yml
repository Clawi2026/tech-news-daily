name: Hourly News Fetch

on:
  schedule:
    # 每小时整点运行（UTC 时间，对应北京时间 00:00-23:00）
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news from RSS (Stable)
        run: node scripts/fetch-rss-news.js
        env:
          NODE_TIMEOUT: 120000

      - name: Commit and push news data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Tech News Bot"
          git add public/data/
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "📰 更新新闻 $(date +%Y-%m-%d-%H-%M)"
            git push origin main
            echo "✅ 数据已推送"
          else
            echo "ℹ️ 无数据更新"
            exit 0
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
